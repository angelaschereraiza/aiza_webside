services:
  llama-text:
    image: ghcr.io/ggerganov/llama.cpp:server
    command:
      - -m
      - /models/${TEXT_MODEL_FILE}
      - -c
      - "${CTX:-4096}"
      - -t
      - "${THREADS:-4}"
      - -b
      - "${BATCH:-512}"
      - --host
      - 0.0.0.0
      - --port
      - "${LLAMA_TEXT_PORT:-8000}"
      - -ngl
      - "0"
      - --chat-template
      - chatml
    volumes:
      - ${MODEL_DIR}:/models:ro,Z
    ports:
      - "${LLAMA_TEXT_PORT:-8000}:${LLAMA_TEXT_PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${LLAMA_TEXT_PORT:-8000}/v1/models"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  llama-vision:
    image: ghcr.io/ggerganov/llama.cpp:server
    command:
      - -m
      - /models/${VISION_MODEL_FILE}
      - --mmproj
      - /models/${VISION_MMPROJ_FILE}
      - -c
      - "${CTX:-4096}"
      - -t
      - "${THREADS:-4}"
      - -b
      - "${BATCH:-128}"
      - --host
      - 0.0.0.0
      - --port
      - "${LLAMA_VISION_PORT:-8001}"
      - -ngl
      - "0"
    volumes:
      - ${MODEL_DIR}:/models:ro,Z
    ports:
      - "${LLAMA_VISION_PORT:-8001}:${LLAMA_VISION_PORT:-8001}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${LLAMA_VISION_PORT:-8001}/v1/models"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  proxy:
    build:
      context: ./backend/ai
      dockerfile: Dockerfile
    environment:
      TEXT_UPSTREAM_BASE: "http://llama-text:${LLAMA_TEXT_PORT:-8000}"
      VISION_UPSTREAM_BASE: "http://llama-vision:${LLAMA_VISION_PORT:-8001}"
      TEXT_MODEL_ID: "${TEXT_MODEL_FILE}"
      VISION_MODEL_ID: "Qwen2-VL-2B-Instruct"
      REQUEST_TIMEOUT: "600"
    ports:
      - "${PROXY_PORT:-9000}:9000"
    depends_on:
      llama-text:
        condition: service_healthy
      llama-vision:
        condition: service_healthy
    restart: unless-stopped
